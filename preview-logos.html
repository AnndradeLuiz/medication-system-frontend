<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Opções de Logo - SGDMI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f0f4f8; 
            padding: 40px; 
            display: flex; 
            flex-direction: column;
            align-items: center;
        }
        h1 { color: #1e3a8a; margin-bottom: 30px; }
        .grid {
            display: flex; 
            flex-wrap: wrap; 
            gap: 30px; 
            justify-content: center; 
            max-width: 1000px;
        }
        .card { 
            background: white; 
            width: 220px; 
            border-radius: 12px; 
            padding: 30px 20px; 
            text-align: center; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
            border: 1px solid #e2e8f0; 
            transition: transform 0.2s;
            cursor: pointer;
        }
        .card:hover {
            transform: translateY(-5px);
            border-color: #2563eb;
        }
        /* Simulando exatamente como ficará na sidebar */
        .preview-sidebar {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
        }
        .icon { font-size: 36px; color: #2563eb; font-weight: 900; }
        .logo-text { font-size: 24px; font-weight: 800; letter-spacing: 1px; color: #1e3a8a; }
        
        .title { font-weight: bold; color: #475569; font-size: 15px; margin-bottom: 10px; border-top: 1px solid #f1f5f9; padding-top: 15px; }
    </style>
    <link rel="icon" href="img/logo-unica-sem-fundo.png">
</head>
<body>

    <h1>Qual destas opções você prefere?</h1>

    <div class="grid">
        <!-- Opção 1 -->
        <div class="card">
            <div class="preview-sidebar">
                <i class="fa-solid fa-hospital-symbol icon"></i>
                <span class="logo-text">SGDMI</span>
            </div>
            <div class="title">Opção 1:<br>Cruz no Círculo</div>
        </div>

        <!-- Opção 2 -->
        <div class="card">
            <div class="preview-sidebar">
                <i class="fa-solid fa-prescription-bottle-medical icon"></i>
                <span class="logo-text">SGDMI</span>
            </div>
            <div class="title">Opção 2:<br>Frasco de Remédio</div>
        </div>

        <!-- Opção 3 -->
        <div class="card">
            <div class="preview-sidebar">
                <i class="fa-solid fa-house-medical icon"></i>
                <span class="logo-text">SGDMI</span>
            </div>
            <div class="title">Opção 3:<br>Clínica / UBS</div>
        </div>

        <!-- Opção 4 -->
        <div class="card">
            <div class="preview-sidebar">
                <i class="fa-solid fa-notes-medical icon"></i>
                <span class="logo-text">SGDMI</span>
            </div>
            <div class="title">Opção 4:<br>Prancheta</div>
        </div>

        <!-- Opção 5 -->
        <div class="card">
            <div class="preview-sidebar">
                <i class="fa-solid fa-heart-pulse icon"></i>
                <span class="logo-text">SGDMI</span>
            </div>
            <div class="title">Opção 5:<br>Coração / Batimento</div>
        </div>

        <!-- Opção 6 -->
        <div class="card">
            <div class="preview-sidebar">
                <i class="fa-solid fa-file-medical icon"></i>
                <span class="logo-text">SGDMI</span>
            </div>
            <div class="title">Opção 6:<br>Arquivo Médico</div>
        </div>
        
        <!-- Opção 7 -->
        <div class="card">
            <div class="preview-sidebar">
                <i class="fa-solid fa-staff-snake icon"></i>
                <span class="logo-text">SGDMI</span>
            </div>
            <div class="title">Opção 7:<br>Símbolo da Medicina</div>
        </div>

        <!-- Opção 8 -->
        <div class="card">
            <div class="preview-sidebar">
                <i class="fa-solid fa-hand-holding-medical icon"></i>
                <span class="logo-text">SGDMI</span>
            </div>
            <div class="title">Opção 8:<br>Mão com Cruz (Cuidado)</div>
        </div>
    </div>

</body>
</html>
