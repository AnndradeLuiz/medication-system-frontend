<!-- ================= VISTA: PEDIDOS (REQUISIÇÕES) ================= -->
<div id="view-request" class="view-section">
    <div class="card p-30 mb-30 border-none shadow-sm">
        <div class="d-flex justify-between align-center mb-20">
            <div>
                <h3 class="fs-xl fw-700 text-main">Requisição - Farmácia Básica e Insumos</h3>
                <p class="text-muted fs-sm">Preencha as quantidades dos medicamentos e insumos
                    solicitados
                    para gerar a folha de impressão oficial.</p>
            </div>
        </div>


        <!-- Seletor de Tipo de Relatório PDF -->
        <div class="mb-20" style="max-width: 320px;">
            <label class="fs-xs fw-700 text-muted d-block mb-8">TIPO DE REQUISIÇÃO</label>
            <select id="pdfReportType"
                style="height: 40px; border: 1.5px solid var(--color-border); border-radius: var(--radius-md); padding: 0 12px; outline: none; background: var(--color-bg); color: var(--color-text-main); font-size: 13.5px; font-weight: 600; cursor: pointer; width: 100%; box-sizing: border-box;">
                <option value="estoque-geral">🏥 Farmácia Básica e Insumos</option>
                <option value="saude-mulher">🌸 Saúde da Mulher / Rede Materna</option>
                <option value="saude-mental">🧠 Saúde Mental / Neurológico</option>
                <option value="hiperdia">❤️ Hipertensão e Diabetes (Hiperdia)</option>
            </select>
        </div>

        <div class="d-flex justify-between align-center mb-20 gap-15 flex-wrap">
            <!-- Busca com lupa do lado de fora -->
            <div class="d-flex align-center gap-8"
                style="background: var(--color-bg); padding: 2px 12px; border: 1.5px solid var(--color-border); border-radius: var(--radius-md); min-width: 320px;">
                <i class="fa-solid fa-search text-muted fs-md" style="font-size: 16px;"></i>
                <input type="text" id="requestSearch"
                    style="border: none; outline: none; background: transparent; width: 100%; height: 38px; color: var(--color-text-main); font-size: 14px;"
                    placeholder="Buscar item na aba ativa..." onkeyup="filterRequestTable()">
            </div>

            <button onclick="printCurrentOrder()"
                class="btn-primary w-auto d-inline-flex align-center gap-8">
                <i class="fa-solid fa-print"></i> Gerar e Imprimir PDF
            </button>
        </div>

        <!-- Abas Modernas -->
        <div class="tabs-container">
            <button id="tab-medications" class="tab-btn active" onclick="switchRequestTab('medications')">
                <i class="fa-solid fa-pills mr-6"></i>Medicamentos
            </button>
            <button id="tab-supplies" class="tab-btn" onclick="switchRequestTab('supplies')">
                <i class="fa-solid fa-syringe mr-6"></i>Insumos Médicos
            </button>
            <button id="tab-cleaning" class="tab-btn" onclick="switchRequestTab('cleaning')">
                <i class="fa-solid fa-hands-bubbles mr-6"></i>Material de Limpeza
            </button>
        </div>

        <!-- Tabela de Itens -->
        <div class="table-responsive"
            style="max-height: calc(100vh - 350px); overflow-y: auto; border: 1px solid var(--color-border); border-radius: var(--radius-md);">
            <table class="table">
                <thead>
                    <tr>
                        <th style="width: 60px; text-align: center;">ORD.</th>
                        <th>Descrição do Item</th>
                        <th style="width: 150px; text-align: center;">Estoque Atual</th>
                        <th style="width: 180px; text-align: center;">Quantidade Solicitada</th>
                    </tr>
                </thead>
                <tbody id="requestItemsTableBody">
                    <!-- Preenchido dinamicamente via JS -->
                </tbody>
            </table>
        </div>
    </div>
</div>
