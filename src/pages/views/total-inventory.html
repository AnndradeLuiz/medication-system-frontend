<div id="view-total-inventory" class="view-section total-inventory-view">
    <section class="total-inventory-content">
        <div class="filter-bar d-flex justify-between total-inventory-filter-bar">
            <div class="filter-group flex-1 max-w-500 d-flex gap-8">
                <div class="pos-relative flex-1">
                    <i class="fa-solid fa-search pos-absolute left-12 top-50 translate-y-n50 text-muted"></i>
                    <input type="text" id="totalInventorySearch" placeholder="Pesquisar item pelo nome..."
                        class="w-full p-l-36">
                </div>
                <button class="btn btn-primary d-flex align-center gap-8" onclick="applyTotalInventoryFilters()">
                    <i class="fa-solid fa-search"></i> Buscar
                </button>
            </div>

            <button class="btn btn-primary d-flex align-center gap-8" onclick="openTotalInventoryFilterModal()">
                <i class="fa-solid fa-sliders"></i> Filtrar
            </button>
        </div>

        <div class="table-responsive total-inventory-table-wrapper">
            <table class="table total-inventory-table">
                <thead>
                    <tr style="height: 60px;">
                        <th class="sortable" onclick="handleTotalInventorySort('name')">ITEM <i class="fa-solid fa-sort sort-icon"
                                id="sort-name"></i></th>
                        <th>TIPO</th>
                        <th>CATEGORIA</th>
                        <th class="sortable" onclick="handleTotalInventorySort('quantity')">QUANTIDADE <i
                                class="fa-solid fa-sort sort-icon" id="sort-quantity"></i></th>
                        <th class="sortable" onclick="handleTotalInventorySort('expiration')">VALIDADE <i
                                class="fa-solid fa-sort sort-icon" id="sort-expiration"></i></th>
                        <th>SITUAÇÃO</th>
                    </tr>
                </thead>
                <tbody id="totalInventoryBody">
                    <tr>
                        <td colspan="6" class="empty-msg empty-state-cell">Defina seus filtros e clique em
                            <b>Buscar</b> para carregar os dados.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="pagination-controls d-flex justify-between align-center mt-20 p-10 bg-white radius-8 shadow-sm total-inventory-pagination">
            <span class="fs-14 text-muted">Mostrando <strong id="totalInventoryPageInfo">0-0 de 0</strong>
                itens</span>
            <div class="d-flex gap-10">
                <button class="btn btn-outline-secondary btn-sm" id="btnPrevTotalInventory"
                    onclick="prevTotalInventoryPage()"><i class="fa-solid fa-chevron-left"></i>
                    Anterior</button>
                <span class="fs-14 fw-600 page-indicator" id="totalInventoryCurrentPage">Pág 1</span>
                <button class="btn btn-outline-secondary btn-sm" id="btnNextTotalInventory"
                    onclick="nextTotalInventoryPage()">Próxima <i class="fa-solid fa-chevron-right"></i></button>
            </div>
        </div>
    </section>

    <!-- Modal de Filtros Avançados -->
    <div id="totalInventoryFilterModal" class="modal-overlay">
        <div class="modal-container">
            <div class="modal-header">
                <h3><i class="fa-solid fa-sliders mr-8"></i> Filtrar</h3>
                <button class="modal-close" onclick="closeTotalInventoryFilterModal()"><i
                        class="fa-solid fa-times"></i></button>
            </div>
            <div class="modal-body">
                <div class="filter-group w-full">
                    <label>TIPO DE ITEM:</label>
                    <select id="totalInventoryTypeFilter" class="w-full">
                        <option value="all">Todos os Tipos</option>
                        <option value="medicamento">Medicamentos</option>
                        <option value="medical">Médico</option>
                        <option value="facility">Sanitário e Uso Geral</option>
                    </select>
                </div>

                <div class="filter-group w-full mt-10">
                    <label>STATUS DO ESTOQUE:</label>
                    <select id="totalInventoryStatusFilter" class="w-full">
                        <option value="all" selected>Todos os Status</option>
                        <option value="normal">Normal</option>
                        <option value="critico">Estoque Crítico</option>
                        <option value="alerta">Vencimento Próximo</option>
                        <option value="vencimento">Lote Vencido</option>
                        <option value="vazio">Sem Estoque</option>
                    </select>
                </div>

                <div class="filter-group w-full mt-10">
                    <label>MOSTRAR (POR PÁGINA):</label>
                    <select id="totalInventoryPageSize" class="w-full">
                        <option value="all">Mostrar Todos</option>
                        <option value="10">10 Itens</option>
                        <option value="25">25 Itens</option>
                        <option value="50" selected>50 Itens</option>
                        <option value="100">100 Itens</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary min-w-100" onclick="resetTotalInventoryFilters()">Limpar</button>
                <button class="btn btn-primary" onclick="closeTotalInventoryFilterModal()">Aplicar e Fechar</button>
            </div>
        </div>
    </div>
</div>
