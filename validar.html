<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validação de Receita - e-Farma SUS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="src/styles/global-tokens.css">
    <link rel="icon" href="src/assets/img/logo-sem-fundo.svg">
    <style>
        body {
            background-color: var(--color-bg);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 20px;
        }

        .validation-card {
            background: var(--color-surface);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 500px;
            padding: 30px 20px;
            text-align: center;
            margin-top: 20px;
        }

        .status-icon {
            font-size: 60px;
            margin-bottom: 15px;
        }

        .status-valid {
            color: var(--color-success);
        }

        .status-invalid {
            color: var(--color-danger);
        }

        .validation-title {
            font-size: var(--font-xl);
            font-weight: var(--weight-bold);
            margin-bottom: 20px;
            color: var(--color-text-main);
        }

        .details-box {
            text-align: left;
            background: var(--color-bg);
            padding: 15px;
            border-radius: var(--radius-sm);
            margin-top: 20px;
            font-size: var(--font-sm);
        }

        .details-box p {
            margin-bottom: 8px;
            color: var(--color-text-main);
        }

        .details-box strong {
            color: var(--color-text-muted);
        }

        .items-list {
            margin-top: 15px;
            border-top: 1px solid var(--color-border);
            padding-top: 15px;
            text-align: left;
        }

        .item-row {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            border-bottom: 1px dashed var(--color-border);
        }

        .item-row:last-child {
            border-bottom: none;
        }

        .loader {
            border: 4px solid var(--color-border);
            border-top: 4px solid var(--color-primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>

<body>
    <div class="validation-card" id="validationCard">
        <div id="loadingSection">
            <div class="loader"></div>
            <p class="validation-title">Verificando Autenticidade...</p>
        </div>

        <div id="resultSection" class="d-none">
            <!-- Renderizado via JS -->
        </div>
    </div>

    <script type="module" src="src/utils/validation.js"></script>
</body>

</html>
